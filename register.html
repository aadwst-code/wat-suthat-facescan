<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนใบหน้า - โรงเรียนวัดสุทัศน์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .video-container { position: relative; max-width: 640px; margin: 0 auto; border: 4px solid #198754; border-radius: 10px; overflow: hidden; background: #000; }
        video { width: 100%; height: auto; display: block; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
    </style>
</head>
<body>
    <div class="container text-center my-4">
        <h2 class="fw-bold text-success mb-3">📝 ลงทะเบียนใบหน้านักเรียน</h2>
        
        <div class="row justify-content-center mb-3">
            <div class="col-md-6">
                <div class="input-group">
                    <input type="text" id="studentId" class="form-control" placeholder="กรอกรหัสนักเรียนที่นี่..." required>
                    <button id="captureBtn" class="btn btn-success" disabled onclick="captureFace()">📸 สแกนและบันทึกใบหน้า</button>
                </div>
            </div>
        </div>

        <div class="video-container shadow-sm">
            <video id="video" autoplay muted playsinline width="640" height="480"></video>
        </div>

        <div class="mt-3">
            <h5 id="status" class="text-primary fw-bold">⏳ กำลังโหลดระบบกล้อง...</h5>
            <a href="index.html" class="btn btn-outline-secondary mt-2 btn-sm">⬅️ กลับไปหน้าสแกนเข้าโรงเรียน</a>
        </div>
    </div>

<script>
// 🚨 นำลิงก์ Web App URL ตัวใหม่มาวางในเครื่องหมายคำพูดด้านล่างนี้
const API_URL = 'https://script.google.com/macros/s/AKfycbw3lN_REvDhfQmdyKWJihcuNmWH_RtUdemK0sihGIHSmVZ643PwkigKz1xm14Q25LzMHw/exec'; 
const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights'; 

let faceDescriptor = null;

async function init() {
    reportStatus("⏳ กำลังโหลด AI สมองกล...");
    try {
        await Promise.all([
            faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]);
        reportStatus("✅ ระบบพร้อมใช้งาน! (กรอกรหัสและหันหน้าเข้ากล้อง)", "green");
        document.getElementById('captureBtn').disabled = false;
        startVideo();
    } catch (e) {
        reportStatus("❌ เกิดข้อผิดพลาดในการโหลด AI", "red");
    }
}

function startVideo() {
    const video = document.getElementById('video');
    navigator.mediaDevices.getUserMedia({ video: {} })
        .then(stream => { video.srcObject = stream; })
        .catch(err => reportStatus("❌ ไม่สามารถเปิดกล้องได้", "red"));
}

function reportStatus(text, color="blue") {
    const st = document.getElementById('status');
    st.innerText = text; st.style.color = color;
}

document.getElementById('video').addEventListener('play', () => {
    const video = document.getElementById('video');
    const canvas = faceapi.createCanvasFromMedia(video);
    document.querySelector('.video-container').append(canvas);
    const displaySize = { width: video.clientWidth, height: video.clientHeight };
    faceapi.matchDimensions(canvas, displaySize);

    setInterval(async () => {
        const detections = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
        canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        if (detections) {
            faceDescriptor = Array.from(detections.descriptor);
            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            faceapi.draw.drawDetections(canvas, resizedDetections);
        } else {
            faceDescriptor = null;
        }
    }, 500);
});

async function captureFace() {
    const studentId = document.getElementById('studentId').value.trim();
    if (!studentId) return alert('กรุณากรอกรหัสนักเรียนก่อนครับ!');
    if (!faceDescriptor) return alert('กล้องยังจับใบหน้าไม่ได้ กรุณามองที่กล้องให้ชัดเจนครับ');

    reportStatus("⏳ กำลังส่งข้อมูลไปยัง Google Sheet...", "orange");
    document.getElementById('captureBtn').disabled = true;

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'registerFace', studentId: studentId, descriptor: faceDescriptor })
        });
        const result = await response.json();
        
        if (result.status === 'success') {
            reportStatus(`✅ บันทึกใบหน้ารหัส ${studentId} สำเร็จ!`, "green");
            document.getElementById('studentId').value = "";
        } else {
            reportStatus(`❌ ผิดพลาด: ${result.msg}`, "red");
        }
    } catch (e) {
        reportStatus("❌ ส่งข้อมูลไม่สำเร็จ", "red");
    }
    setTimeout(() => { document.getElementById('captureBtn').disabled = false; }, 2000);
}

window.onload = () => { setTimeout(init, 1000); };
</script>
</body>
</html>
