<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนใบหน้า - โรงเรียนวัดสุทัศน์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 700px; margin: auto; }
        video { border: 3px solid #1a73e8; border-radius: 8px; margin-top: 15px; max-width: 100%; height: auto; }
        input { padding: 12px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; margin: 10px; width: 60%; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; background: #2e7d32; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #1b5e20; }
        #status { font-size: 18px; font-weight: bold; color: #1a73e8; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="box">
        <h1 style="margin-top: 0; color: #1a73e8;">ระบบลงทะเบียนใบหน้าใหม่</h1>
        <p>ให้นักเรียนมองกล้อง แล้วกดปุ่มบันทึกใบหน้า</p>
        
        <input type="text" id="studentId" placeholder="ใส่เลขประจำตัวนักเรียน เช่น 5565">
        <button onclick="captureFace()">📷 บันทึกใบหน้า</button>
        
        <p id="status">กำลังโหลดกล้อง...</p>
        <video id="video" autoplay muted></video>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script>
        const video = document.getElementById('video');
        const statusText = document.getElementById('status');
        
        // === สำคัญ: นำลิงก์ Web App URL จาก Google Sheet มาใส่ตรงนี้ด้วยครับ ===
        const API_URL = 'https://script.google.com/macros/s/AKfycbx07MZwTDZ8yCQ93VASlSaRi0wlai57wN4spNQK-3bQtFPZ43iXPHscvr1jQXVKrQD4tg/exec'; 

        const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
        Promise.all([
          faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
          faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]).then(() => {
            statusText.innerText = "กล้องพร้อมใช้งานแล้ว";
            navigator.mediaDevices.getUserMedia({ video: {} }).then(stream => video.srcObject = stream);
        });

        async function captureFace() {
            const studentId = document.getElementById('studentId').value;
            if(!studentId) return alert("กรุณากรอกรหัสนักเรียนก่อนครับ!");

            statusText.innerText = "กำลังสแกนใบหน้า... กรุณามองกล้องนิ่งๆ 📸";
            statusText.style.color = "orange";
            
            const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();

            if (!detection) {
                statusText.innerText = "❌ ไม่พบใบหน้า (หรือแสงไม่พอ) กรุณาลองใหม่";
                statusText.style.color = "red";
                return;
            }

            const descriptor = Array.from(detection.descriptor);
            statusText.innerText = "กำลังส่งข้อมูลใบหน้าไปที่ Google Sheet... ⏳";

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'registerFace', studentId: studentId, descriptor: descriptor })
                });
                const result = await res.json();
                
                if(result.status === 'success') {
                    statusText.innerText = "✅ ลงทะเบียนใบหน้าสำเร็จ! ข้อมูลถูกบันทึกแล้ว";
                    statusText.style.color = "green";
                    document.getElementById('studentId').value = ""; // เคลียร์ช่อง
                } else {
                    statusText.innerText = "❌ ผิดพลาด: " + result.msg;
                    statusText.style.color = "red";
                }
            } catch(e) {
                statusText.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่ออินเทอร์เน็ต";
                statusText.style.color = "red";
            }
        }
    </script>
</body>
</html>
