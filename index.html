<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสแกนใบหน้า - โรงเรียนวัดสุทัศน์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .header { background: #1a73e8; color: white; width: 100%; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .container { margin-top: 30px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        video { border-radius: 8px; border: 3px solid #1a73e8; width: 640px; height: 480px; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; }
        .video-container { position: relative; display: inline-block; margin-top: 15px; }
        .status { margin-top: 20px; font-size: 24px; font-weight: bold; color: #2e7d32; }
        .footer { margin-top: 40px; margin-bottom: 20px; color: #555; font-size: 14px; text-align: center; }
        .controls { margin-top: 15px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 5px; margin: 5px; font-weight: bold; }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin: 0;">ระบบสแกนใบหน้า เข้า-ออก โรงเรียนวัดสุทัศน์</h1>
        <p style="margin: 5px 0 0 0;">สำนักงานเขตพระนคร กรุงเทพมหานคร</p>
    </div>

    <div class="container">
        <div class="controls">
            <button onclick="setScanMode('เข้า')">โหมด: สแกนเข้าโรงเรียน</button>
            <button onclick="setScanMode('ออก')" style="background:#d32f2f;">โหมด: สแกนกลับบ้าน</button>
        </div>
        <p>สถานะปัจจุบัน: <span id="currentMode" style="font-weight:bold; color:#1a73e8; font-size: 20px;">เข้า</span></p>
        
        <div class="video-container" id="videoContainer">
            <video id="video" autoplay muted></video>
        </div>
        <div class="status" id="statusText">กำลังโหลดระบบ AI กรุณารอสักครู่...</div>
    </div>

    <div class="footer">
        <p>พัฒนาระบบโดย: <strong>นายชาติชาย สมานทอง</strong></p>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <!-- คัดลอกตั้งแต่บรรทัดนี้เป็นต้นไป -->
<script>
// ลิงก์ระบบหลังบ้านและคลังสมอง AI ของคุณชาติชาย
const API_URL = 'https://script.google.com/macros/s/AKfycbgyVud6KS3d8f2NksKVbyTgNd60sjuQIVA5_bw2WWatx_tnmaLRu7E77TL8_HcHsdLw/exec'; 
const MODEL_URL = 'https://aadwst-code.github.io/wat-suthat-facescan/'; 

const video = document.getElementById('video');
// โค้ดส่วนนี้จะฉลาดขึ้น: ถ้าหา id="status" ไม่เจอ มันจะวิ่งไปหาข้อความสีเขียวบนหน้าจอให้เองอัตโนมัติครับ
let statusText = document.getElementById('status') || document.querySelector('.text-success') || document.body; 
let faceMatcher;
let isScanning = false;

// 🚨 กล่องดักจับ Error บนหน้าจอ (ถ้ามีอะไรพัง แถบสีแดงจะขึ้นเตือนทันที)
window.onerror = function(msg, url, line) {
    const errorDiv = document.createElement('div');
    errorDiv.style = "position:fixed; top:0; left:0; width:100%; background:red; color:white; padding:20px; z-index:9999; font-size:16px; font-family:sans-serif; text-align:left;";
    errorDiv.innerHTML = `<b>❌ ตรวจพบข้อผิดพลาด:</b> ${msg} (บรรทัดที่: ${line})`;
    document.body.appendChild(errorDiv);
    return false;
};

async function startSystem() {
    try {
        statusText.innerText = "⏳ [ระบบตื่นแล้ว] กำลังดึงฐานข้อมูลและโหลดสมอง AI...";
        statusText.style.color = "#b45309";

        if (typeof faceapi === 'undefined') {
            throw new Error("ไม่พบไลบรารี faceapi กรุณาตรวจสอบว่าในหน้า index.html มีการใส่ลิงก์โหลด face-api.js แล้วหรือยัง");
        }

        // 1. ดึงข้อมูลจาก Google Sheet
        const response = await fetch(API_URL);
        const students = await response.json();

        // 2. โหลดโมเดล AI
        await Promise.all([
            faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]);

        // 3. เตรียมข้อมูลใบหน้า
        const labeledFaceDescriptors = students.map(student => {
            if (!student.descriptor || student.descriptor.length === 0) return null;
            return new faceapi.LabeledFaceDescriptors(student.id, [new Float32Array(student.descriptor)]);
        }).filter(item => item !== null);

        if (labeledFaceDescriptors.length > 0) {
            faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.5); 
            statusText.innerText = "✅ ระบบ AI พร้อมใช้งาน กำลังเปิดกล้อง...";
            statusText.style.color = "green";
            startVideo();
        } else {
            statusText.innerText = "⚠️ เชื่อมต่อสำเร็จ! แต่ไม่มีข้อมูลใบหน้าในคอลัมน์ L (กรุณาไปลงทะเบียนใบหน้าก่อน)";
            statusText.style.color = "#d97706";
            startVideo();
        }
    } catch (error) {
        throw new Error(error.message || "ไม่สามารถโหลดระบบ AI ได้");
    }
}

function startVideo() {
    if (!video) return;
    navigator.mediaDevices.getUserMedia({ video: {} })
        .then(stream => { video.srcObject = stream; })
        .catch(err => {
            statusText.innerText = "❌ ไม่สามารถเปิดกล้องได้ (กรุณากดอนุญาตให้สิทธิ์เข้าถึงกล้อง)";
            statusText.style.color = "red";
        });
}

if (video) {
    video.addEventListener('play', () => {
        const canvas = faceapi.createCanvasFromMedia(video);
        document.body.append(canvas);
        const displaySize = { width: video.width, height: video.height };
        faceapi.matchDimensions(canvas, displaySize);

        setInterval(async () => {
            if (!faceMatcher || isScanning) return;

            const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

            for (const detection of resizedDetections) {
                const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
                new faceapi.draw.DrawBox(detection.detection.box, { label: bestMatch.label }).draw(canvas);

                if (bestMatch.label !== 'unknown' && !isScanning) {
                    isScanning = true;
                    const studentId = bestMatch.label;
                    statusText.innerText = `⏳ ตรวจพบรหัส: ${studentId} กำลังส่งข้อมูล...`;

                    const snapCanvas = document.createElement('canvas');
                    snapCanvas.width = video.videoWidth;
                    snapCanvas.height = video.videoHeight;
                    snapCanvas.getContext('2d').drawImage(video, 0, 0);
                    const imageBase64 = snapCanvas.toDataURL('image/jpeg', 0.5).split(',')[1]; 

                    try {
                        const res = await fetch(API_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'logScan', studentId: studentId, status: 'สแกนเข้าโรงเรียน', image: imageBase64 })
                        });
                        const result = await res.json();
                        if(result.status === 'success') {
                            statusText.innerText = `🔔 บันทึกสำเร็จ: ${result.name}`;
                            statusText.style.color = "blue";
                        }
                    } catch(e) {}

                    setTimeout(() => {
                        isScanning = false;
                        statusText.innerText = "🎥 ระบบสแกนพร้อมใช้งาน";
                        statusText.style.color = "green";
                    }, 5000);
                }
            }
        }, 1000);
    });
}

// สั่งรันระบบทันที
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startSystem);
} else {
    startSystem();
}
</script>
<!-- สิ้นสุดซอร์สโค้ดที่จะวางทับครับ -->
</body>
</html>
