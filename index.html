<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสแกนใบหน้า - โรงเรียนวัดสุทัศน์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .header { background: #1a73e8; color: white; width: 100%; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .container { margin-top: 30px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        video { border-radius: 8px; border: 3px solid #1a73e8; width: 640px; height: 480px; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; }
        .video-container { position: relative; display: inline-block; margin-top: 15px; }
        .status { margin-top: 20px; font-size: 24px; font-weight: bold; color: #2e7d32; }
        .footer { margin-top: 40px; margin-bottom: 20px; color: #555; font-size: 14px; text-align: center; }
        .controls { margin-top: 15px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 5px; margin: 5px; font-weight: bold; }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin: 0;">ระบบสแกนใบหน้า เข้า-ออก โรงเรียนวัดสุทัศน์</h1>
        <p style="margin: 5px 0 0 0;">สำนักงานเขตพระนคร กรุงเทพมหานคร</p>
    </div>

    <div class="container">
        <div class="controls">
            <button onclick="setScanMode('เข้า')">โหมด: สแกนเข้าโรงเรียน</button>
            <button onclick="setScanMode('ออก')" style="background:#d32f2f;">โหมด: สแกนกลับบ้าน</button>
        </div>
        <p>สถานะปัจจุบัน: <span id="currentMode" style="font-weight:bold; color:#1a73e8; font-size: 20px;">เข้า</span></p>
        
        <div class="video-container" id="videoContainer">
            <video id="video" autoplay muted></video>
        </div>
        <div class="status" id="statusText">กำลังโหลดระบบ AI กรุณารอสักครู่...</div>
    </div>

    <div class="footer">
        <p>พัฒนาระบบโดย: <strong>นายชาติชาย สมานทอง</strong></p>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <!-- คัดลอกตั้งแต่บรรทัดนี้เป็นต้นไป -->
<!-- คัดลอกตั้งแต่บรรทัดนี้ลงไปแทนที่ของเดิมได้เลยครับ -->
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxRI4QYBHaPFyzBxtOpOBZVqPCmQUjAkHiegPaXvenwirdruysj2GxPd6wSVnzSWbvmeg/exec'; 
const MODEL_URL = 'https://aadwst-code.github.io/wat-suthat-facescan/'; 

const video = document.getElementById('video');
let statusText = document.getElementById('status') || document.querySelector('.text-success') || document.body; 
let faceMatcher;
let isScanning = false;

// ฟังก์ชันสำหรับบังคับเปลี่ยนข้อความแจ้งสถานะหน้าจอ
function reportStatus(text, color = "blue") {
    if (statusText) {
        statusText.innerText = text;
        statusText.style.color = color;
    }
}

async function startSystem() {
    try {
        // ก้าวที่ 1: ตรวจสอบไลบรารีหลัก
        reportStatus("⏳ [ขั้นตอนที่ 1/4] กำลังตรวจสอบตัวควบคุม AI (faceapi)...", "#b45309");
        if (typeof faceapi === 'undefined') {
            document.write("<h3 style='color:red;padding:20px;'>❌ พังที่ขั้นตอน 1: ไม่พบไฟล์ face-api.js ในระบบ กรุณาตรวจสอบว่าใน index.html มีบรรทัดสคริปต์โหลดไฟล์นี้อยู่ด้านบนไหม</h3>");
            return;
        }

        // ก้าวที่ 2: ดึงฐานข้อมูลจาก Google Sheet
        reportStatus("⏳ [ขั้นตอนที่ 2/4] กำลังเชื่อมต่อดึงรายชื่อจาก Google Sheet...", "#b45309");
        const response = await fetch(API_URL).catch(err => {
            throw new Error("อินเทอร์เน็ตหรือลิงก์ Web App URL มีปัญหา (Fetch Failed)");
        });
        const students = await response.json();
        
        // ก้าวที่ 3: โหลดสมอง AI
        reportStatus("⏳ [ขั้นตอนที่ 3/4] กำลังดาวน์โหลดไฟล์สมอง AI จาก GitHub...", "#1e40af");
        try {
            // ลองโหลดจากโฟลเดอร์หลักก่อน
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
        } catch(e) {
            // ถ้าไม่เจอ ให้ลองดึงจากโฟลเดอร์ย่อย /models/
            reportStatus("⏳ ไม่พบไฟล์ในโฟลเดอร์หลัก กำลังค้นหาในโฟลเดอร์ /models/ ...", "#1e40af");
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL + 'models/'),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL + 'models/'),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL + 'models/')
            ]);
        }

        // ก้าวที่ 4: จัดเตรียมการเปรียบเทียบใบหน้า
        reportStatus("⏳ [ขั้นตอนที่ 4/4] กำลังประมวลผลฐานข้อมูลใบหน้า...", "#1e40af");
        const labeledFaceDescriptors = students.map(student => {
            if (!student.descriptor || student.descriptor.length === 0) return null;
            return new faceapi.LabeledFaceDescriptors(student.id, [new Float32Array(student.descriptor)]);
        }).filter(item => item !== null);

        if (labeledFaceDescriptors.length > 0) {
            faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.5); 
            reportStatus("✅ ระบบพร้อมใช้งาน 100% กำลังเปิดกล้อง...", "green");
            startVideo();
        } else {
            reportStatus("⚠️ ตรวจสอบสำเร็จ แต่คอลัมน์ L ในกูเกิลชีตยังว่างเปล่า (กรุณาไปลงทะเบียนใบหน้าก่อนนะครู)", "#d97706");
            startVideo();
        }

    } catch (error) {
        // หากมีจุดใดพัง ข้อความสีเขียวจะกลายเป็นสีแดง และบอกสาเหตุทันที!
        reportStatus(`❌ พังเพราะ: ${error.message}`, "red");
        console.error(error);
    }
}

function startVideo() {
    if (!video) return;
    navigator.mediaDevices.getUserMedia({ video: {} })
        .then(stream => { video.srcObject = stream; })
        .catch(err => {
            reportStatus("❌ ไม่สามารถเปิดกล้องได้ (กรุณากดอนุญาตให้สิทธิ์เข้าถึงกล้องในเบราว์เซอร์)", "red");
        });
}

if (video) {
    video.addEventListener('play', () => {
        const canvas = faceapi.createCanvasFromMedia(video);
        document.body.append(canvas);
        const displaySize = { width: video.width, height: video.height };
        faceapi.matchDimensions(canvas, displaySize);

        setInterval(async () => {
            if (!faceMatcher || isScanning) return;

            const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

            for (const detection of resizedDetections) {
                const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
                new faceapi.draw.DrawBox(detection.detection.box, { label: bestMatch.label }).draw(canvas);

                if (bestMatch.label !== 'unknown' && !isScanning) {
                    isScanning = true;
                    const studentId = bestMatch.label;
                    reportStatus(`⏳ ตรวจพบรหัส: ${studentId} กำลังส่งข้อมูล...`, "#b45309");

                    const snapCanvas = document.createElement('canvas');
                    snapCanvas.width = video.videoWidth;
                    snapCanvas.height = video.videoHeight;
                    snapCanvas.getContext('2d').drawImage(video, 0, 0);
                    const imageBase64 = snapCanvas.toDataURL('image/jpeg', 0.5).split(',')[1]; 

                    try {
                        const res = await fetch(API_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'logScan', studentId: studentId, status: 'สแกนเข้าโรงเรียน', image: imageBase64 })
                        });
                        const result = await res.json();
                        if(result.status === 'success') {
                            reportStatus(`🔔 บันทึกสำเร็จ: ${result.name}`, "blue");
                        }
                    } catch(e) {}

                    setTimeout(() => {
                        isScanning = false;
                        reportStatus("🎥 ระบบสแกนพร้อมใช้งาน", "green");
                    }, 5000);
                }
            }
        }, 1000);
    });
}

// สั่งลุยระบบทันที
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startSystem);
} else {
    startSystem();
}
</script>
<!-- สิ้นสุดซอร์สโค้ดที่จะนำไปวางครับ -->
</body>
</html>
