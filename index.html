<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสแกนใบหน้า - โรงเรียนวัดสุทัศน์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="face-api.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'ChulaCharasNew', sans-serif; }
        .video-container { position: relative; max-width: 640px; margin: 0 auto; border: 4px solid #0d6efd; border-radius: 10px; overflow: hidden; background: #000; }
        video { width: 100%; height: auto; display: block; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        .status-box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container text-center my-4">
        <h2 class="fw-bold text-primary mb-1">🏫 ระบบสแกनใบหน้าเข้า-ออกเรียน</h2>
        <p class="text-muted">โรงเรียนวัดสุทัศน์ สำนักงานเขตพระนคร</p>

        <div class="video-container shadow-sm">
            <video id="video" autoplay muted playsinline width="640" height="480"></video>
        </div>

        <div class="max-width: 640px; margin: 0 auto;" style="max-width: 640px; margin: 20px auto 0 auto;">
            <div class="status-box">
                <h4 id="status" class="fw-bold text-success m-0">⏳ ระบบกำลังเริ่มต้นทำงาน...</h4>
            </div>
            <a href="register.html" class="btn btn-outline-secondary mt-3 btn-sm">🔗 ไปหน้าลงทะเบียนนักเรียนใหม่</a>
        </div>
    </div>

<script>
// ลิงก์ระบบหลังบ้านและคลังสมอง AI ของคุณชาติชาย
const API_URL = 'https://script.google.com/macros/s/AKfycbz0IVSGApfnjuoYS1dE80B8CRQbF_RPVPVHfGGuWiZhA9Bc1g1pnkFB6oluuOusqGGUyg/exec'; 
const MODEL_URL = 'https://aadwst-code.github.io/wat-suthat-facescan'; 

const video = document.getElementById('video');
const statusText = document.getElementById('status');
let faceMatcher;
let isScanning = false;

// ฟังก์ชันบังคับเปลี่ยนข้อความรายงานบนหน้าจอ
function reportStatus(text, color = "blue") {
    if (statusText) {
        statusText.innerText = text;
        statusText.style.color = color;
    }
}

async function startSystem() {
    try {
        // ขั้นตอนที่ 1: ตรวจสอบตัวควบคุม AI
        reportStatus("⏳ [1/4] กำลังตรวจสอบตัวควบคุม AI (faceapi)...", "#b45309");
        if (typeof faceapi === 'undefined') {
            reportStatus("❌ พังที่ขั้นตอน 1: หาไฟล์ face-api.min.js ไม่เจอในโฟลเดอร์", "red");
            return;
        }

        // ขั้นตอนที่ 2: ดึงรายชื่อจากกูเกิลชีต
        reportStatus("⏳ [2/4] กำลังเชื่อมต่อดึงรายชื่อจาก Google Sheet...", "#b45309");
        const response = await fetch(API_URL).catch(err => {
            throw new Error("อินเทอร์เน็ตหรือลิงก์ Web App URL ในกูเกิลสคริปต์ปิดกั้น (Fetch Failed)");
        });
        const students = await response.json();
        
        // ขั้นตอนที่ 3: โหลดสมอง AI (ชี้เป้าไปที่โฟลเดอร์หลักโดยตรง)
        reportStatus("⏳ [3/4] กำลังดาวน์โหลดไฟล์สมอง AI จาก GitHub...", "#1e40af");
        await Promise.all([
            faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]);

        // ขั้นตอนที่ 4: จัดเตรียมการเปรียบเทียบใบหน้า
        reportStatus("⏳ [4/4] กำลังประมวลผลฐานข้อมูลใบหน้า...", "#1e40af");
        const labeledFaceDescriptors = students.map(student => {
            if (!student.descriptor || student.descriptor.length === 0) return null;
            return new faceapi.LabeledFaceDescriptors(student.id, [new Float32Array(student.descriptor)]);
        }).filter(item => item !== null);

        if (labeledFaceDescriptors.length > 0) {
            faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.5); 
            reportStatus("✅ ระบบพร้อมใช้งาน 100% กำลังเปิดกล้อง...", "green");
            startVideo();
        } else {
            reportStatus("⚠️ เชื่อมต่อสำเร็จ! แต่คอลัมน์ L ใน Google Sheet ว่างเปล่า (กรุณาลงทะเบียนใบหน้าก่อน)", "#d97706");
            startVideo();
        }

    } catch (error) {
        reportStatus(`❌ พังเพราะ: ${error.message}`, "red");
        console.error(error);
    }
}

function startVideo() {
    if (!video) return;
    navigator.mediaDevices.getUserMedia({ video: {} })
        .then(stream => { video.srcObject = stream; })
        .catch(err => {
            reportStatus("❌ ไม่สามารถเปิดกล้องได้ (กรุณากดอนุญาตให้สิทธิ์เข้าถึงกล้องบนเบราว์เซอร์)", "red");
        });
}

if (video) {
    video.addEventListener('play', () => {
        const canvas = faceapi.createCanvasFromMedia(video);
        document.querySelector('.video-container').append(canvas);
        const displaySize = { width: video.clientWidth, height: video.clientHeight };
        faceapi.matchDimensions(canvas, displaySize);

        setInterval(async () => {
            if (!faceMatcher || isScanning) return;

            const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

            for (const detection of resizedDetections) {
                const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
                
                // วาดกล่องจับใบหน้า
                new faceapi.draw.DrawBox(detection.detection.box, { label: bestMatch.label }).draw(canvas);

                if (bestMatch.label !== 'unknown' && !isScanning) {
                    isScanning = true;
                    const studentId = bestMatch.label;
                    reportStatus(`⏳ ตรวจพบรหัส: ${studentId} กำลังส่งข้อมูล...`, "#b45309");

                    const snapCanvas = document.createElement('canvas');
                    snapCanvas.width = video.videoWidth;
                    snapCanvas.height = video.videoHeight;
                    snapCanvas.getContext('2d').drawImage(video, 0, 0);
                    const imageBase64 = snapCanvas.toDataURL('image/jpeg', 0.5).split(',')[1]; 

                    try {
                        const res = await fetch(API_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'logScan', studentId: studentId, status: 'สแกนเข้าโรงเรียน', image: imageBase64 })
                        });
                        const result = await res.json();
                        if(result.status === 'success') {
                            reportStatus(`🔔 บันทึกสำเร็จ: ${result.name}`, "blue");
                        }
                    } catch(e) {}

                    setTimeout(() => {
                        isScanning = false;
                        reportStatus("🎥 ระบบสแกนพร้อมใช้งาน", "green");
                    }, 5000);
                }
            }
        }, 1000);
    });
}

// สั่งรันระบบทันทีที่โหลดหน้าเว็บ
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startSystem);
} else {
    startSystem();
}
</script>
</body>
</html>
